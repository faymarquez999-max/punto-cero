# =====================================================
# PATRONES MAESTROS QUE LA IA DERIVA:
# =====================================================
# 1. Animal involucrado → multiplicador 1.5-2x
# 2. Injusticia clara + víctima identificable → potencial muy alto
# 3. Frase/imagen memeable → potencial alto
# 4. Atleta nacional + victoria épica → alto en país de origen
# 5. Anticipación a evento masivo → ventana semanas
# 6. Figura polarizante + shock → alto pero volátil
# 7. Localización geográfica concreta ayuda al targeting
# 8. Post-COVID sensibilidad alta a pandémicos
# 9. Copycat de tendencia caliente = peligro (MELANIA tras TRUMP)
# 10. Celebrity launch directo = ventana corta pero explosiva (LIBRA, TRUMP)
# 11. **DORMANT EVENT COIN PATTERN** (TRUMP gala): coin existente con drawdown >80% + evento programado <30d → entrada de valor antes del re-pump
# 12. **4CHAN /BIZ/ PATTERN** (MOG): ticker mencionado repetidamente en /biz/ pre-mainstream = oportunidad temprana
# 13. **AI AGENT META** (FARTCOIN, GOAT, PIPPIN): AI agent con personalidad + treasury propia + cuenta social = nueva categoría top 2026
# 14. **POLITIFI ELECTION YEAR**: midterms 2026 → TRUMP/MAGA/DEMS coins acumulan momentum hacia noviembre
# 15. **NFT-LINKED COMMUNITY** (PENGU/BONK): ecosystem real + community depth = sostenibilidad mayor que pure memes
