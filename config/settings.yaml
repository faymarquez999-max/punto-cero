# Configuración V3 — radar cultural de narrativas

scoring:
  # Score memético 0-100 (calculado por LLM con dimensiones ponderadas)
  min_alert_score: 70           # >=70 lanza NARRATIVA POTENCIAL
  strong_score: 80              # >=80 = STRONG_WATCH (mayor duración)
  shadow_log_score: 50          # log silencioso 50-69 para calibración
  llm_model_primary: "llama-3.3-70b-versatile"
  llm_model_fallback: "llama-3.1-8b-instant"
  llm_provider: "groq"
  llm_temperature: 0.4          # un poco más creativo para tickers/inferencia

# ACTIVE WATCH SYSTEM — vigilancia persistente cuando se detecta narrativa
active_watch:
  enabled: true
  default_duration_hours: 72       # watch dura 72h por defecto
  strong_duration_hours: 168       # STRONG_WATCH dura 7 días
  scan_dex_every_n_cycles: 1       # cada ciclo escanea DexScreener
  max_active_watches: 50           # límite para no saturar
  candidate_tickers_per_watch: 8

# DEX MATCHER — filtros DUROS para validar coins
dex_matcher:
  enabled: true
  require_dexscreener_listed: true
  min_mc_usd: 10000                # ignora basura <10k
  max_mc_usd: 500000               # 500k máximo para entrada early
  preferred_mc_max: 80000          # ideal <80k
  min_liquidity_usd: 5000
  min_volume_24h_usd: 5000
  min_holders: 50                  # si el dato está disponible
  min_age_minutes: 10
  use_rugcheck: true
  min_safety_score: 50
  fuzzy_match_threshold: 0.70      # más estricto que antes

# EVENT-LINKED RADAR — coins existentes + catalizador inferido por LLM
event_radar:
  enabled: true
  scan_every_n_cycles: 4           # cada 4 ciclos (≈1h) — caro porque usa LLM
  max_coins_to_evaluate: 25
  mc_range_min: 10000
  mc_range_max: 500000
  min_drawdown_for_dormant_pct: 50 # solo evalúa si está en valle
  min_rr_score: 6.5                # 0-10
  cooldown_hours: 48

# Pump.fun se mantiene SOLO para detectar que existe, no para alertar directo
pump_detection:
  enabled: true
  use_only_as_existence_proof: true

# Momentum / velocity / clustering (se mantienen)
momentum_boost:
  enabled: true
  multi_source_threshold: 2        # bajado: 2 fuentes ya es señal
  multi_source_bonus: 6
  velocity_window_hours: 2
  velocity_x2_bonus: 4

deduplication:
  narrative_cooldown_hours: 24
  coin_alert_cooldown_hours: 24
  use_semantic_fingerprint: true

# DESACTIVADOS — restos del bot anterior
smart_money:
  enabled: false

ticker_velocity:
  enabled: false

event_coin_watcher:
  enabled: false                   # reemplazado por event_radar (LLM-driven)

filters:
  languages: ["en", "es"]
  # Categorías abiertas — la IA puede usar cualquiera
  blocked_categories:               # NO disparar alertas de estas (eventos rutinarios)
    - scheduled_sports_event
    - scheduled_gaming_release
    - routine_political_news

rate_limits:
  groq_requests_per_minute: 20
  reddit_pause_seconds: 1.5
  bluesky_pause_seconds: 1
  dexscreener_pause_seconds: 0.3
  fourchan_pause_seconds: 1.0

health_check:
  enabled: true
  zero_signals_runs_before_alert: 4

daily_digest:
  enabled: true
  hour_utc: 7
  include_active_watches: true
  include_top_narratives_24h: 5

paths:
  data_dir: "data"
  alerts_log: "data/alerts_log.json"
  sent_keys_file: "data/sent_keys.json"
  signals_history_file: "data/signals_history.json"
  health_state_file: "data/health.json"
  active_watches_file: "data/active_watches.json"     # NUEVO
  matched_coins_file: "data/matched_coins.json"       # NUEVO
  event_radar_state_file: "data/event_radar.json"     # NUEVO
  narrative_log_file: "data/narratives.json"

telegram:
  parse_mode: "HTML"
  disable_web_preview: true
  enable_status_command: true
