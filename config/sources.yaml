# Fuentes V3 — radar cultural amplio
# El bot lee el mundo en MUCHAS direcciones, no solo crypto.

reddit:
  enabled: true
  subreddits:
    # Generalistas de virales / breaking news
    - all
    - news
    - worldnews
    - PublicFreakout
    - nextfuckinglevel
    - Damnthatsinteresting
    - interestingasfuck
    - Wellthatsucks
    - oddlyterrifying
    - mildlyinfuriating
    - BlackPeopleTwitter
    - WhitePeopleTwitter
    - facepalm
    - Wtf
    - HolUp
    # Conspiranoia / misterio / UFOs
    - UFOs
    - conspiracy
    # Política / drama
    - politics
    - inthenews
    # Tech / leaks
    - technology
    - gadgets
    - apple
    - leaks
    # Cultura internet
    - OutOfTheLoop
    - todayilearned
    - AskReddit
    # Spanish
    - spain
    - es
    - argentina
    - mexico
    # Crypto (solo para detectar coins, no como fuente principal de narrativa)
    - CryptoCurrency
    - solana
  hot_limit: 30
  min_score: 80
  also_fetch_rising: true

google_news:
  enabled: true
  feeds:
    # General
    - "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en"
    - "https://news.google.com/rss?hl=es-ES&gl=ES&ceid=ES:es"
    # Topic búsquedas — breaking / viral / shock
    - "https://news.google.com/rss/search?q=breaking+OR+viral+OR+shocking&hl=en"
    - "https://news.google.com/rss/search?q=leak+OR+rumor+OR+exclusive&hl=en"
    - "https://news.google.com/rss/search?q=trump+statement+OR+elon+musk+tweet&hl=en"
    - "https://news.google.com/rss/search?q=celebrity+death+OR+celebrity+illness+OR+scandal&hl=en"
    - "https://news.google.com/rss/search?q=animal+viral+OR+animal+rescued+OR+animal+killed&hl=en"
    - "https://news.google.com/rss/search?q=bizarre+OR+absurd+OR+weird+news&hl=en"
    - "https://news.google.com/rss/search?q=conspiracy+OR+ufo+OR+disclosure&hl=en"
    - "https://news.google.com/rss/search?q=pandemic+OR+outbreak+OR+virus+spreading&hl=en"
    - "https://news.google.com/rss/search?q=memecoin+OR+pump.fun+trending&hl=en"
    - "https://news.google.com/rss/search?q=ultima+hora+OR+escandalo+OR+viral&hl=es-ES&gl=ES"
    - "https://news.google.com/rss/search?q=insolito+OR+impactante+OR+sorprendente&hl=es-ES&gl=ES"

# NUEVO: Reuters/AP/BBC y otros breaking feeds especializados
breaking_news_feeds:
  enabled: true
  feeds:
    # Reuters (mundial breaking)
    - url: "https://news.google.com/rss/search?q=site:reuters.com&hl=en"
      name: "reuters"
    # AP News
    - url: "https://news.google.com/rss/search?q=site:apnews.com&hl=en"
      name: "ap"
    # BBC
    - url: "http://feeds.bbci.co.uk/news/rss.xml"
      name: "bbc"
    # Al Jazeera
    - url: "https://www.aljazeera.com/xml/rss/all.xml"
      name: "aljazeera"
    # Bloomberg (top)
    - url: "https://news.google.com/rss/search?q=site:bloomberg.com&hl=en"
      name: "bloomberg"
    # Politico
    - url: "https://news.google.com/rss/search?q=site:politico.com&hl=en"
      name: "politico"
    # TMZ (celebrity)
    - url: "https://www.tmz.com/rss.xml"
      name: "tmz"
    # The Hollywood Reporter
    - url: "https://www.hollywoodreporter.com/feed/"
      name: "hollywoodreporter"

# NUEVO: Wikipedia Recent Changes — señal pre-mainstream cuando algo importante pasa
wikipedia:
  enabled: true
  # Cuando una página de alto perfil recibe muchas ediciones de golpe, algo está pasando
  # Lista de páginas "high-value" a vigilar
  watched_pages:
    - "Donald_Trump"
    - "Elon_Musk"
    - "Joe_Biden"
    - "Kamala_Harris"
    - "Vladimir_Putin"
    - "Xi_Jinping"
    - "Benjamin_Netanyahu"
    - "Volodymyr_Zelenskyy"
    - "Kanye_West"
    - "Taylor_Swift"
    - "Joe_Rogan"
    - "Drake_(musician)"
    - "MrBeast"
    - "2026"
    - "Deaths_in_2026"
    - "List_of_2026_albums"
    - "Grand_Theft_Auto_VI"
  edit_spike_threshold: 5      # >=5 ediciones en 30 min = señal
  check_recent_changes_global: true   # también globalmente

# X / Twitter via Nitter (best effort, frágil)
nitter:
  enabled: true
  instances:
    - "https://xcancel.com"
    - "https://nitter.privacydev.net"
    - "https://nitter.poast.org"
    - "https://nitter.tiekoetter.com"
  # Cuentas concretas a vigilar (timeline scraping)
  accounts_to_watch:
    - "elonmusk"
    - "realDonaldTrump"
    - "PopBase"
    - "PopCrave"
    - "WatcherGuru"
    - "WhaleWire"
    - "DeItaone"
    - "ZeroHedge"
    - "FirstSquawk"
    - "Disclosetv"
    - "BNONews"
    - "Reuters"
  # Búsquedas dinámicas
  search_queries:
    - "breaking news"
    - "just in"
    - "leaked"
    - "viral"
    - "shocked"
    - "memecoin"
    - "pump.fun"

bluesky:
  enabled: true
  search_queries:
    - "breaking news"
    - "just in"
    - "viral"
    - "leaked"
    - "memecoin"
    - "$WIF OR $PEPE OR $BONK"

fourchan_biz:
  enabled: true
  catalog_url: "https://a.4cdn.org/biz/catalog.json"
  thread_url_template: "https://a.4cdn.org/biz/thread/{id}.json"
  min_ticker_mentions: 3
  max_threads_to_scan: 80
  ignored_tickers: ["USDC", "USDT", "ETH", "BTC", "SOL", "USD", "EUR", "GBP",
                    "PEPE", "BONK", "WIF", "TRUMP", "MELANIA", "FARTCOIN", "GOAT"]

# Polymarket — mercados de predicción (cambios de probabilidad = señal alpha)
polymarket:
  enabled: true
  # API gratis: https://gamma-api.polymarket.com/
  api_base: "https://gamma-api.polymarket.com"
  # Vigilamos eventos con cambio >10% en 24h
  min_probability_change_pct: 10
  max_markets_per_cycle: 50

# Google Trends (mantenido, si pytrends falla devuelve vacío)
google_trends:
  enabled: true
  geo_targets: ["US", "ES", "GB", "WORLDWIDE"]

# Telegram channels (placeholder — requiere setup)
telegram_channels:
  enabled: false
  channels: []

# Crypto sources — SOLO para detección de existencia de coins
crypto_sources:
  pump_fun:
    enabled: true
    new_tokens_limit: 100
    only_as_existence_proof: true   # no alertar directo de pump.fun
  dexscreener:
    enabled: true
    chains: ["solana"]
  solana_tracker:
    enabled: true
    api_key_env: "SOLANATRACKER_API_KEY"
    trending_timeframe: "1h"
    trending_limit: 30
    max_mc_usd: 500000
  rugcheck:
    enabled: true
    min_safety_score: 50
