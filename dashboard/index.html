<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Punto Cero — Dashboard</title>
<style>
  :root {
    --bg: #0b0d10; --card: #15191e; --text: #e8eaed; --muted: #8a93a0;
    --accent: #ff6b35; --good: #4caf50; --warn: #ffb300; --bad: #ef5350;
    --border: #232830; --watch: #7c4dff;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5; }
  header { padding: 24px; border-bottom: 1px solid var(--border); }
  h1 { margin: 0; font-size: 22px; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  main { max-width: 1200px; margin: 0 auto; padding: 16px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 16px; }
  .card h2 { margin: 0 0 12px; font-size: 16px; color: var(--accent); }
  .stat { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .stat:last-child { border: 0; }
  .label { color: var(--muted); font-size: 13px; }
  .val { font-weight: 600; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  .score { display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: 600;
    background: rgba(76, 175, 80, .12); color: var(--good); }
  .score.warn { background: rgba(255, 179, 0, .12); color: var(--warn); }
  .score.bad { background: rgba(239, 83, 80, .12); color: var(--bad); }
  .cat { font-size: 11px; padding: 2px 6px; background: rgba(255, 107, 53, .12); color: var(--accent); border-radius: 3px; }
  .tickers { font-family: monospace; font-size: 12px; color: var(--watch); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .empty { color: var(--muted); font-style: italic; padding: 12px 0; }
  .footer { text-align: center; color: var(--muted); font-size: 12px; padding: 32px 0; }
  .tabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .tab { padding: 6px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--muted); }
  .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  .alert-row { display: flex; flex-direction: column; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 4px; }
  .alert-row .meta { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>🎯 Punto Cero — Radar Cultural</h1>
  <div class="sub" id="last-update">Cargando…</div>
</header>
<main>
  <div class="grid">
    <div class="card">
      <h2>📊 Status</h2>
      <div id="status-block">Cargando…</div>
    </div>
    <div class="card">
      <h2>🔭 Watches activos</h2>
      <div id="watches-block">Cargando…</div>
    </div>
  </div>

  <div class="card">
    <h2>🚨 Alertas (últimas 80)</h2>
    <div class="tabs" id="alert-tabs">
      <span class="tab active" data-kind="all">Todas</span>
      <span class="tab" data-kind="potential_narrative">🚨 Narrativas potenciales</span>
      <span class="tab" data-kind="coin_matched">💎 Coins matched</span>
      <span class="tab" data-kind="event_linked">🎯 Event-linked</span>
      <span class="tab" data-kind="shadow">🌑 Shadow (50-69)</span>
    </div>
    <div id="alerts-list"></div>
    <div class="empty" id="alerts-empty" style="display:none">Sin alertas todavía.</div>
  </div>

  <div class="footer">
    Datos leídos de <code>data/*.json</code> · actualizado cada ciclo.
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
async function fetchJson(p) {
  try { const r = await fetch(p + "?t=" + Date.now()); if (!r.ok) return null;
        return await r.json(); }
  catch (e) { return null; }
}
function scoreClass(s) { return s >= 70 ? "score" : (s >= 50 ? "score warn" : "score bad"); }
function fmtTime(iso) { try { return new Date(iso).toLocaleString(); } catch { return iso; } }

let allAlerts = [];
let currentFilter = "all";

function renderAlerts() {
  const list = $("alerts-list");
  list.innerHTML = "";
  const filtered = currentFilter === "all"
    ? allAlerts
    : allAlerts.filter(a => a.kind === currentFilter);
  if (!filtered.length) { $("alerts-empty").style.display = ""; return; }
  $("alerts-empty").style.display = "none";
  filtered.slice(0, 80).forEach(a => {
    const p = a.payload || {};
    const div = document.createElement("div");
    div.className = "alert-row";
    let title = p.title || p.ticker || "?";
    let extra = "";
    if (a.kind === "potential_narrative") {
      extra = `<span class="${scoreClass(p.score)}">${p.score}</span> <span class="cat">${p.category||""}</span>`;
      const tickers = (p.candidate_tickers || []).slice(0,5).join(", ");
      if (tickers) extra += ` <span class="tickers">🎯 ${tickers}</span>`;
    } else if (a.kind === "coin_matched") {
      extra = `<span class="cat">$${p.ticker||"?"}</span> MC $${(p.mc||0).toLocaleString()}`;
      title = `Match: ${p.ticker} (watch ${(p.watch_id||"").slice(0,8)})`;
    } else if (a.kind === "event_linked") {
      extra = `<span class="cat">$${p.ticker||"?"}</span> R/R ${p.rr||"?"}`;
      title = (p.catalyst || "").slice(0,140);
    } else if (a.kind === "shadow") {
      extra = `<span class="${scoreClass(p.score)}">${p.score}</span> shadow`;
    }
    div.innerHTML = `
      <div class="meta"><span>${fmtTime(a.ts)}</span><span class="cat">${a.kind}</span>${extra}</div>
      <div>${title}</div>`;
    list.appendChild(div);
  });
}

document.addEventListener("click", (e) => {
  if (e.target.classList.contains("tab")) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    e.target.classList.add("active");
    currentFilter = e.target.dataset.kind;
    renderAlerts();
  }
});

(async () => {
  const [alerts, watches, health] = await Promise.all([
    fetchJson("../data/alerts_log.json"),
    fetchJson("../data/active_watches.json"),
    fetchJson("../data/health.json"),
  ]);

  if (health) {
    $("status-block").innerHTML =
      `<div class="stat"><span class="label">Último ciclo</span><span class="val">${fmtTime(health.last_run_at)}</span></div>`
    + `<div class="stat"><span class="label">Señales</span><span class="val">${health.last_signal_count ?? "?"}</span></div>`
    + `<div class="stat"><span class="label">Zero-streak</span><span class="val">${health.zero_streak ?? 0}</span></div>`;
    $("last-update").textContent = "Última actualización: " + fmtTime(health.last_run_at);
  } else {
    $("status-block").innerHTML = `<div class="empty">No hay datos de health todavía.</div>`;
  }

  if (watches && watches.watches) {
    const active = watches.watches.filter(w => w.status === "active");
    if (!active.length) {
      $("watches-block").innerHTML = `<div class="empty">No hay watches activos.</div>`;
    } else {
      const html = active.slice(0, 10).map(w => {
        const tickers = (w.candidate_tickers || []).slice(0,5).join(", ");
        return `<div class="stat"><span class="label">${w.score} · ${w.category}</span><span class="val tickers">${tickers}</span></div>
                <div style="font-size:12px;color:var(--muted);padding:0 0 8px;">${(w.narrative_summary||"").slice(0,120)}</div>`;
      }).join("");
      $("watches-block").innerHTML = html;
    }
  } else {
    $("watches-block").innerHTML = `<div class="empty">Sin datos.</div>`;
  }

  if (alerts && alerts.alerts) {
    allAlerts = alerts.alerts.slice(-200).reverse();
    renderAlerts();
  } else {
    $("alerts-empty").style.display = "";
  }
})();
</script>
</body>
</html>
